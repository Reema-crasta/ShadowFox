
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Client Project Task Manager</title>

<style>

body{
font-family:Arial;
margin:0;
background:#f4f4f4;
text-align:center;
}

header{
background:#1f2937;
color:white;
padding:20px;
}

.container{
max-width:600px;
margin:40px auto;
background:white;
padding:30px;
border-radius:10px;
box-shadow:0 5px 15px rgba(0,0,0,0.1);
}

input{
padding:10px;
width:70%;
border:1px solid #ccc;
border-radius:5px;
}

button{
padding:10px 15px;
border:none;
background:#2563eb;
color:white;
border-radius:5px;
cursor:pointer;
}

button:hover{
background:#1d4ed8;
}

ul{
list-style:none;
padding:0;
margin-top:20px;
}

li{
display:flex;
justify-content:space-between;
align-items:center;
padding:10px;
border-bottom:1px solid #ddd;
}

.delete{
background:#ef4444;
}

.delete:hover{
background:#dc2626;
}

</style>
</head>

<body>

<header>
<h1>Client Project Task Manager</h1>
<p>Full-Stack Demo (Frontend + Backend Simulation)</p>
</header>

<div class="container">

<input id="taskInput" placeholder="Enter client task">
<button onclick="addTask()">Add Task</button>

<ul id="taskList"></ul>

</div>

<script>

/* DATABASE (LocalStorage simulation) */

let tasks = JSON.parse(localStorage.getItem("tasks")) || []

/* LOAD TASKS */

function loadTasks(){

const list=document.getElementById("taskList")
list.innerHTML=""

tasks.forEach((task,index)=>{

list.innerHTML+=`
<li>
${task}
<button class="delete" onclick="deleteTask(${index})">Delete</button>
</li>
`

})

}

/* ADD TASK */

function addTask(){

const input=document.getElementById("taskInput")
const task=input.value.trim()

if(task===""){
alert("Please enter a task")
return
}

tasks.push(task)

localStorage.setItem("tasks",JSON.stringify(tasks))

input.value=""

loadTasks()

}

/* DELETE TASK */

function deleteTask(index){

tasks.splice(index,1)

localStorage.setItem("tasks",JSON.stringify(tasks))

loadTasks()

}

/* INITIAL LOAD */

loadTasks()

</script>

</body>
</html>
